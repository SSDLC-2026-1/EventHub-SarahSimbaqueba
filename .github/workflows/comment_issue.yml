name: Comment on issue manually
on: 
  workflow_dispatch: 
permissions: 
  issues: write
  contents: read
jobs:
  comment-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on issue
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: 1,
            body: 'Comentario generado automáticamente desde un workflow manual.'
          })
